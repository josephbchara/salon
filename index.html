<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salon Joseph Bchara</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #1e6363;
      --teal-dark: #0f3d3d;
      --teal-mid:  #2a7a7a;
      --teal-soft: #4a9090;
      --cream:     #f4f0e8;
      --warm:      #e8e0d0;
      --offwhite:  #faf8f4;
      --gold:      #1e6363;
      --text:      #0f3d3d;
    }

    html, body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem 0;
      font-family: 'Jost', sans-serif; font-weight: 300;
      background: #fff;
      position: relative; overflow-x: hidden;
    }





    .card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 2.8rem 2.2rem 2.4rem;
      width: min(380px, 94vw);
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(30,99,99,.12);
      box-shadow:
        0 2px 4px rgba(30,99,99,.06),
        0 8px 32px rgba(30,99,99,.08),
        0 0 0 1px rgba(255,255,255,.6) inset;
      animation: fadeUp .6s ease both;
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before {
      top: 14px; left: 14px;
      border-width: 1px 0 0 1px;
    }
    .card::after {
      bottom: 14px; right: 14px;
      border-width: 0 1px 1px 0;
    }

    /* Logo */
    .logo {
      width: 160px;
      margin-bottom: .4rem;
    }

    .tagline {
      font-size: .62rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--teal-soft); margin-bottom: 1.8rem;
    }

    /* Divider */
    .divider {
      width: 100%; height: 1px; margin-bottom: 1.8rem;
      background: linear-gradient(to right,
        transparent,
        rgba(30,99,99,.2) 20%,
        rgba(30,99,99,.5) 50%,
        rgba(30,99,99,.2) 80%,
        transparent);
    }

    /* Buttons */
    .buttons { display: flex; flex-direction: column; gap: .75rem; width: 100%; }

    .btn {
      display: flex; align-items: center; gap: .9rem;
      padding: .85rem 1.3rem;
      text-decoration: none;
      background: rgba(30,99,99,.04);
      border: 1px solid rgba(30,99,99,.14);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: .78rem; font-weight: 300; letter-spacing: .1em;
      transition: background .25s, border-color .25s, transform .2s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--teal);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform .3s ease;
    }
    .btn:hover {
      background: rgba(30,99,99,.08);
      border-color: rgba(30,99,99,.3);
      transform: translateX(4px);
      box-shadow: -3px 0 12px rgba(30,99,99,.08);
    }
    .btn:hover::before { transform: scaleY(1); }

    .btn-icon {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-call   .btn-icon { background: rgba(30,99,99,.1);  color: var(--teal); }
    .btn-wa     .btn-icon { background: rgba(37,211,102,.1); color: #25d366; }
    .btn-ig     .btn-icon { background: rgba(228,64,95,.1);  color: #e4405f; }

    .btn-text { flex: 1; }
    .btn-sub {
      display: block; font-size: .58rem; letter-spacing: .15em;
      text-transform: uppercase; color: var(--teal-soft); margin-top: .15rem;
    }
    .btn-arrow {
      font-size: .65rem; color: rgba(30,99,99,.3);
      transition: transform .25s, color .25s;
    }
    .btn:hover .btn-arrow { transform: translateX(3px); color: var(--teal); }

    /* Footer */
    .footer {
      margin-top: 1.8rem;
      font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
      color: rgba(30,99,99,.35); text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Responsive ── */

    /* Large screens: center with max width */
    @media (min-width: 480px) {
      .card {
        padding: 3rem 2.8rem 2.6rem;
      }
      .logo { width: 180px; }
    }

    /* Small phones (≤360px) */
    @media (max-width: 360px) {
      .card {
        padding: 2rem 1.4rem 2rem;
        width: 100%;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }
      .logo { width: 130px; }
      .tagline { font-size: .58rem; }
      .btn { padding: .8rem 1rem; }
      .btn-icon { width: 34px; height: 34px; }
      .btn-sub { display: none; }
    }

    /* Landscape phones */
    @media (max-height: 500px) and (orientation: landscape) {
      body { align-items: flex-start; padding: 1rem 0; }
      .card {
        padding: 1.5rem 2rem;
        margin: auto;
      }
      .logo { width: 110px; margin-bottom: .2rem; }
      .tagline { margin-bottom: 1rem; }
      .divider { margin-bottom: 1rem; }
      .buttons { gap: .5rem; }
      .btn { padding: .65rem 1.1rem; }
      .footer { margin-top: 1rem; }
    }

    /* Touch devices — remove hover slide effect, make tap area bigger */
    @media (hover: none) {
      .btn:hover { transform: none; box-shadow: none; }
      .btn:active {
        background: rgba(30,99,99,.12);
        border-color: rgba(30,99,99,.35);
      }
      .btn { padding-top: 1rem; padding-bottom: 1rem; }
    }
  </style>
</head>
